name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get
          
      - name: Build Web App
        # Note: If your GitHub repository is named something other than "encline",
        # change the --base-href value to "/your-repo-name/"
        run: |
          cd frontend
          flutter build web --release --base-href "/encline/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/build/web
          branch: gh-pages
